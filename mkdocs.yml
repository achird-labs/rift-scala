site_name: rift-scala
site_description: Official Scala 3 SDK for Rift — a Mountebank-compatible HTTP/HTTPS mock server
site_url: https://achird-labs.github.io/rift-scala/
repo_url: https://github.com/achird-labs/rift-scala
repo_name: achird-labs/rift-scala
docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
nav:
  - Home: index.md
  - Guides:
      - Ledger pattern: samples/ledger-pattern.md
  - Reference:
      - Design (RFC-003): DESIGN.md
      - Engine parity: PARITY.md
