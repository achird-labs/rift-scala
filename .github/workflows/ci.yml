name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Check formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck
      - name: Compile
        run: sbt compile
      - name: Test
        run: sbt test
        env:
          # G3 replay must actually RUN a live engine on each job — RIFT_G3_REQUIRE names the lane
          # this job requires, so a silently-unavailable engine is a RED build, not a green skip
          # (issue #63 backstop). JDK 22 → embedded (in-process FFM; jars wired in build.sbt under
          # JDK 22+). JDK 21 → spawn (out-of-process child; binary pinned via rift-java). A future
          # matrix JDK inherits one lane explicitly rather than silently skipping both. See DESIGN
          # §5.13 / D8 and issue #63.
          RIFT_G3_REQUIRE: ${{ matrix.java == '21' && 'spawn' || 'embedded' }}
