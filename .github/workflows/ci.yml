name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - name: Set up sbt
        uses: sbt/setup-sbt@v1
      - name: Check formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck
      - name: Compile
        run: sbt compile
      - name: Test
        run: sbt test
        env:
          # G3 replay runs a live engine on both jobs. The JDK 22 job runs the embedded (in-process
          # FFM) lane — its jars are wired in build.sbt only under JDK 22+. The JDK 21 job owns the
          # out-of-process spawn lane: RIFT_G3_SPAWN=1 enables CorpusG3SpawnSpec, which launches the
          # engine binary (version pinned via rift-java). See DESIGN §5.13 / D8.
          RIFT_G3_SPAWN: ${{ matrix.java == '21' && '1' || '0' }}
