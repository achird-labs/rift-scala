# Keeps `val riftJava` in project/Dependencies.scala in sync with the latest EtaCassiopeia/rift-java
# release. Thin caller of the shared reusable dep-bump scaffold — all invariant logic (poll / compare
# / idempotent branch+PR / injection-safe changelog / dry-run) lives in rift-java's dep-bump.yml, and
# the one-line rift-java pin edit lives in scripts/bump.sh. A real "chore/rift-java-<version>" PR only
# appears when EtaCassiopeia/rift-java has published a newer release. On green CI, auto-release.yml
# merges it and cuts the next patch.

name: Rift-java Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do everything except push the branch / open the PR; just log what would happen"
        type: boolean
        default: false
  schedule:
    # Daily: 06:00 UTC.
    - cron: '0 6 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: EtaCassiopeia/rift-java/.github/workflows/dep-bump.yml@master
    with:
      upstream_repo: EtaCassiopeia/rift-java
      branch_prefix: chore/rift-java-
      dep_name: rift-java
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
