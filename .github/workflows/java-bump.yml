# Keeps `val riftJava` in project/Dependencies.scala in sync with the latest EtaCassiopeia/rift-java
# release.
#
# That val is the single source of truth for the rift-java pin: it drives every module's
# rift-java-core / -testcontainers / -embedded / -natives coordinate, and transitively pins the rift
# engine and the sdk-conformance corpus (DESIGN §7 / D9). This workflow does NOT bump anything unless
# EtaCassiopeia/rift-java has actually published a release newer than the version currently pinned — a
# real "chore/rift-java-<version>" PR only appears when that condition is true. Otherwise every run is
# a no-op that logs "up to date" and exits cleanly, on both the daily schedule and manual dispatch.
#
# When a bump PR is opened, CI runs it like any other PR. If CI is green, the companion
# `auto-release.yml` workflow squash-merges it and cuts the next patch release. If CI is red, the PR
# stays open for a human to fix — that is the intended "wait for human intervention" path.
#
# Manual dispatch accepts a `dry_run` input: when true, the workflow does every read/compare/branch/
# commit step locally but stops short of pushing the branch or opening the PR, logging what it would
# have done instead. That makes "dry-run green on manual dispatch" verifiable without waiting for an
# upstream release.

name: Rift-java Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do everything except push the branch / open the PR; just log what would happen"
        type: boolean
        default: false
  schedule:
    # Daily: 06:00 UTC.
    - cron: '0 6 * * *'

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  UPSTREAM_REPO: EtaCassiopeia/rift-java
  PIN_FILE: project/Dependencies.scala

jobs:
  rift-java-bump:
    name: Check for a newer rift-java release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve dry-run flag
        id: flags
        shell: bash
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Dry run: ${DRY_RUN}"

      - name: Determine latest upstream release and current pin
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          if ! gh auth status >/dev/null 2>&1; then
            echo "gh is not authenticated (GITHUB_TOKEN missing/invalid) — cannot query releases."
            exit 1
          fi

          RELEASE_JSON="$(gh release view --repo "${UPSTREAM_REPO}" --json tagName,body)"
          TAG_NAME="$(echo "${RELEASE_JSON}" | jq -r '.tagName')"
          if [ -z "${TAG_NAME}" ] || [ "${TAG_NAME}" = "null" ]; then
            echo "Could not resolve a latest release tag for ${UPSTREAM_REPO}."
            exit 1
          fi
          LATEST="${TAG_NAME#v}"

          CURRENT="$(grep -oP '(?<=val riftJava = ")[^"]+' "${PIN_FILE}" | head -n1)"
          if [ -z "${CURRENT}" ]; then
            echo "Could not read 'val riftJava' from ${PIN_FILE}."
            exit 1
          fi

          echo "Latest upstream release: ${LATEST} (tag ${TAG_NAME})"
          echo "Current pinned version:  ${CURRENT}"

          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          # Multiline changelog excerpt, truncated so it fits comfortably in a PR body.
          BODY="$(echo "${RELEASE_JSON}" | jq -r '.body // ""' | head -c 4000)"
          # Randomized heredoc delimiter so a release-body line can't spoof the terminator
          # (the documented GitHub Actions multiline-output-injection vector).
          DELIM="RIFT_JAVA_BUMP_BODY_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            echo "${BODY}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          LATEST="${{ steps.versions.outputs.latest }}"
          CURRENT="${{ steps.versions.outputs.current }}"

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "Up to date (current=${CURRENT}, latest=${LATEST}). Nothing to do."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SMALLEST="$(printf '%s\n%s\n' "${CURRENT}" "${LATEST}" | sort -V | head -n1)"
          if [ "${SMALLEST}" = "${LATEST}" ]; then
            echo "Latest release (${LATEST}) is not newer than current (${CURRENT}). Nothing to do."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "A newer rift-java release is available: ${CURRENT} -> ${LATEST}."
          echo "should_bump=true" >> "$GITHUB_OUTPUT"

      - name: Check for an existing branch or PR
        id: existing
        if: steps.compare.outputs.should_bump == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="chore/rift-java-${{ steps.versions.outputs.latest }}"

          EXISTS=false
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists on origin."
            EXISTS=true
          fi

          PR_COUNT="$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH}" --state open --json number --jq 'length')"
          if [ "${PR_COUNT}" -gt 0 ]; then
            echo "An open PR already targets branch ${BRANCH}."
            EXISTS=true
          fi

          if [ "${EXISTS}" = "true" ]; then
            echo "Idempotent no-op: branch/PR for ${BRANCH} already present."
          fi

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "exists=${EXISTS}" >> "$GITHUB_OUTPUT"

      - name: Bump the rift-java pin and open a PR
        if: steps.compare.outputs.should_bump == 'true' && steps.existing.outputs.exists == 'false'
        shell: bash
        env:
          LATEST: ${{ steps.versions.outputs.latest }}
          CURRENT: ${{ steps.versions.outputs.current }}
          BRANCH: ${{ steps.existing.outputs.branch }}
          DRY_RUN: ${{ steps.flags.outputs.dry_run }}
          CHANGELOG: ${{ steps.versions.outputs.body }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # `val riftJava` is the single source of truth (DESIGN §7); no other literal hard-codes the
          # rift-java version, and the repo's own release version comes from the git tag via dynver,
          # so this one-line bump is self-consistent. (The doc comment mentioning the transitive engine
          # version is intentionally left alone — mapping a rift-java release back to its bundled engine
          # version would couple this workflow to rift-java internals for no functional gain.)
          sed -i "s|val riftJava = \"${CURRENT}\"|val riftJava = \"${LATEST}\"|" "${PIN_FILE}"

          # Fail loudly if the pin did not actually change (a rename/format drift would otherwise ship a
          # no-op, red PR).
          if grep -q "val riftJava = \"${CURRENT}\"" "${PIN_FILE}" \
             || ! grep -q "val riftJava = \"${LATEST}\"" "${PIN_FILE}"; then
            echo "Failed to bump ${CURRENT} -> ${LATEST}; the 'val riftJava' pin was not updated."
            exit 1
          fi

          git add "${PIN_FILE}"
          git commit \
            -m "chore(deps): bump rift-java to ${LATEST}" \
            -m "Bumps 'val riftJava' in ${PIN_FILE} (the single source of truth for the rift-java-core / -testcontainers / -embedded / -natives coordinates, and transitively the pinned rift engine and sdk-conformance corpus)."

          PR_TITLE="chore(deps): bump rift-java to ${LATEST}"

          # Build the PR body in a temp file rather than a heredoc: this run step is embedded in an
          # indented YAML block scalar, and a heredoc terminator here would not reliably land at
          # column 0, which breaks heredoc parsing.
          PR_BODY_FILE="$(mktemp)"
          {
            printf 'Bumps the pinned rift-java version from `%s` to `%s`, tracked by `val riftJava` in\n' "${CURRENT}" "${LATEST}"
            printf '`%s` (all rift-java module coordinates, plus the transitive engine + conformance corpus).\n\n' "${PIN_FILE}"
            printf '### Upstream release notes (EtaCassiopeia/rift-java %s)\n\n' "${LATEST}"
            printf '%s\n\n' "${CHANGELOG}"
            printf -- '---\n\n'
            printf 'Full-auto loop: when CI (JDK 21 spawn + JDK 22 embedded conformance) is green, the\n'
            printf '`auto-release.yml` workflow squash-merges this PR and cuts the next patch release. If CI\n'
            printf 'is red, this PR stays open for human intervention. Opened automatically by the\n'
            printf 'rift-java-bump workflow.\n'
          } > "${PR_BODY_FILE}"

          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN: would push branch '${BRANCH}' and open a PR titled:"
            echo "  ${PR_TITLE}"
            echo "DRY RUN: PR body would be:"
            cat "${PR_BODY_FILE}"
            exit 0
          fi

          git push origin "${BRANCH}"

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.event.repository.default_branch || 'master' }}" \
            --head "${BRANCH}" \
            --title "${PR_TITLE}" \
            --body-file "${PR_BODY_FILE}"
