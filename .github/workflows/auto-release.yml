# Closes the full-auto dependency loop: when CI passes on a rift-java bump PR (opened by
# `java-bump.yml`), squash-merge it and cut the next patch release.
#
# Triggered by the *conclusion* of the CI workflow (workflow_run), so it observes the real, aggregate
# CI result — success only if BOTH matrix jobs pass (JDK 21 spawn replay + JDK 22 embedded
# conformance). A red CI run simply does nothing here: the bump PR stays open for human intervention.
# That is the intended fail-to-human path.
#
# Guarded to act ONLY on a successful, PR-triggered CI run whose head is a `chore/rift-java-*` branch
# in THIS repo (never a fork) — so an arbitrary green PR can never trip an auto-merge + publish.
#
# Publishing is inline (`sbt ci-release`, the same command as release.yml), so the loop needs no extra
# PAT/secret beyond the Sonatype/PGP secrets release.yml already uses. The `vX.Y.Z` tag is pushed with
# GITHUB_TOKEN — which deliberately does NOT re-trigger release.yml — so the release is published
# exactly once (here), and the tag is just the durable record + the seed for the next patch increment.
#
# FIRST RELEASE IS GATED TO A HUMAN: rift-scala has no `v*` tag yet. Until one exists, this job merges
# the bump PR but does NOT publish — cut the first release deliberately by pushing a `v0.1.0` tag
# (release.yml publishes it). Auto-release takes over from the next bump onward.

name: Auto-release on green bump

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  auto-release:
    name: Merge bump PR and cut a patch release
    # Only a successful, PR-triggered CI run on a same-repo rift-java bump branch.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'chore/rift-java-')
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Merge the bump PR
        id: merge
        shell: bash
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          PR="$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')"
          if [ -z "${PR}" ]; then
            echo "No open PR for ${BRANCH} (already merged, or closed). Nothing to do."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Squash-merging PR #${PR} (${BRANCH})."
          gh pr merge "${PR}" --repo "${{ github.repository }}" --squash --delete-branch
          echo "merged=true" >> "$GITHUB_OUTPUT"

      - name: Compute the next patch version (first release gated to a human)
        id: ver
        if: steps.merge.outputs.merged == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "${LATEST_TAG}" ]; then
            echo "::notice::rift-scala has no v* release tag yet. The bump PR is merged, but the FIRST"
            echo "::notice::release is intentionally left to a human — cut it by pushing a v0.1.0 tag"
            echo "::notice::(release.yml publishes it). Auto-release takes over from the next bump."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          V="${LATEST_TAG#v}"
          MAJ="${V%%.*}"; REST="${V#*.}"; MIN="${REST%%.*}"; PAT="${REST##*.}"
          if ! printf '%s' "${MAJ}${MIN}${PAT}" | grep -qE '^[0-9]+$'; then
            echo "::error::Latest tag ${LATEST_TAG} is not a plain vMAJOR.MINOR.PATCH; refusing to guess. Cut the release by hand."
            exit 1
          fi
          NEXT="${MAJ}.${MIN}.$((PAT + 1))"
          echo "Latest tag ${LATEST_TAG} -> next v${NEXT}."
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.ver.outputs.publish == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        if: steps.ver.outputs.publish == 'true'
        uses: sbt/setup-sbt@v1

      - name: Tag the merge commit and publish
        if: steps.ver.outputs.publish == 'true'
        shell: bash
        env:
          NEXT: ${{ steps.ver.outputs.next }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          set -euo pipefail

          # The squash-merge advanced master on the remote; move to its new HEAD before tagging so the
          # release points at the merge commit, not the stale checkout.
          git fetch origin "${{ github.event.repository.default_branch }}"
          git reset --hard FETCH_HEAD

          TAG="v${NEXT}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null || git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; nothing to publish (idempotent no-op)."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} (auto-cut after rift-java bump)"

          # GITHUB_TOKEN-pushed tags do NOT trigger release.yml, so publishing stays exactly-once (the
          # inline ci-release below). The pushed tag is the durable record + the next-increment seed.
          git push origin "${TAG}"

          # dynver derives the version from the just-created tag, so ci-release publishes ${NEXT}
          # (not a -SNAPSHOT). Identical command to release.yml, run inline so no extra PAT is needed.
          sbt ci-release
